{% extends 'base.html' %}

{% block pageheading %}Book a Lane{% endblock %}

{% block main %}

<form class = "myform" method="post">
        <div class="form-group">
            <div class="form-label"> Role: </div>
            <div class="form-element">
                <select name="pool" required>
                    <option value="porky_ville_pool">Porkyville Regional Aquatic Centre</option>
                    <option value="goatyville_pool">Goatyville High Performance Aquatic Centre</option>
                    <option value="wellington_regional_aqautic_centre">Wellington Regional Aqautic Centre</option>
                    <option value="aut_millennium_national_aqautic_centre">AUT Millennium National Aqautic Centre</option>
                </select>
            </div>
        </div>

        <div class = "form-group">
            <div class="form-label"> Date: </div>
            <div class = "form-element"> <input type = "datetime-local" name = "date" ></div>
        </div>

        <div class = "form-group">
            <div class="form-label">  </div>
            <div class = "form-element">
                <select name="time" required>
                    <option value="06:00">06:00</option>
                    <option value="07:00">07:00</option>
                    <option value="08:00">08:00</option>
                    <option value="09:00">09:00</option>
                    <option value="10:00">10:00</option>
                    <option value="11:00">11:00</option>
                    <option value="12:00">12:00</option>
                    <option value="13:00">13:00</option>
                    <option value="14:00">14:00</option>
                    <option value="15:00">15:00</option>
                    <option value="16:00">16:00</option>
                    <option value="17:00">17:00</option>
                    <option value="18:00">18:00</option>
                    <option value="19:00">19:00</option>
                    <option value="20:00">20:00</option>
                    <option value="21:00">21:00</option>
                </select>
            </div>
        </div>

        <div class = "form-group">
            <div class="form-label">  </div>
            <div class = "form-element"> <input type = "submit" value="Login"></div>
        </div>

    </form>


{% endblock %}
