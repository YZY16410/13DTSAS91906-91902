{% extends 'base.html' %}

{% block pageheading %}Book a Lane{% endblock %}

{% block main %}

<form class="myform" method="post" action="/submit-booking">
    <div class="form-group">
        <div class="form-label"> Pool: </div>
        <div class="form-element">
            <select name="pool" required>
                <option value="porky_ville_pool">Porkyville Regional Aquatic Centre</option>
                <option value="goatyville_pool">Goatyville High Performance Aquatic Centre</option>
                <option value="wellington_regional_aquatic_centre">Wellington Regional Aquatic Centre</option>
                <option value="aut_millennium_national_aquatic_centre">AUT Millennium National Aquatic Centre</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"> Lane Number: </div>
        <div class="form-element">
            <select name = "lane_id" requried>
                {% for lane in available_lane %}
                    <option value = "{{ lane }}">{{ lane }}</option
                {% else %}
                    <option value = "">No Lanes Available</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"> Date: </div>
        <div class="form-element">
            <input type="date" name="booking_date" required>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"> Start Time: </div>
        <div class="form-element">
            <select id = "start_time" name="start_time" required>
                {% for time in time_slots %}
                    <option value="{{ time }}">{{ time }}</option>
                {% else %}
                    <option value = "">No times available</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"> Duration: </div>
        <div class="form-element">
            <select name="duration" required>
                <option value="1">1 Hour</option>
                <option value="1.5">1 Hour 30 Mins</option>
                <option value="2">2 Hours</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="form-label"></div>
        <div class="form-element">
            <input type="submit" value="Book Lane">
        </div>
    </div>
</form>

{% endblock %}
